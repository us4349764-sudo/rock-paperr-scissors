name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev
          pip install --upgrade pip
          pip install buildozer kivy Cython

      - name: Force Accept Android Licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          yes | thash -c "echo -e '\n24106d7b5491deaa2312d11a713ee77d33c1a977' > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license" || true
          yes | thash -c "echo -e '\n85c6f5d856341415fde351b78c8fcd0072045d0c' >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license" || true
          yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true

      - name: Build with Buildozer
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
